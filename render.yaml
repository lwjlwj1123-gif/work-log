services:
  - type: web
    name: work-log
    runtime: node
    plan: free            # 무료 플랜 고정
    region: singapore     # Turso DB(ap-northeast-1)와 가까운 무료 리전
    buildCommand: npm install
    startCommand: node server.js
    autoDeploy: true
    envVars:
      - key: TURSO_URL
        sync: false        # Render 대시보드에서 직접 입력 (비밀값)
      - key: TURSO_TOKEN
        sync: false        # Render 대시보드에서 직접 입력 (비밀값)
